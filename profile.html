<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontawesome/css/all.css">
    <title>theMealDb Project: Impostazioni</title>


</head>
<body>
    <!-- Barra con i tasti per navigare -->
    <header class="profileBar">
        <div class="menuUserCookbook">
            <button id="homeButton"><i class="fa-solid fa-home"></i><span> Torna in Home</span></button>
            <button id="cookbookButton"><i class="fa-solid fa-book"></i><span> Ricettario</span></button>
            <button id="logoutButton"><i class="fa-solid fa-arrow-right-from-bracket"></i><span> Log Out</span></button>
        </div>
    </header>

    <!-- Sfondo grigio che contiene tutti i tasti -->
    <div class="cardBackground">
        <!-- Div con l'elenco delle varie card -->
        <div class="profileSettingGrid">
            <!-- Impostazioni per cambiare username -->
            <div class="recipeCard profileCard">
                <h3>USERNAME</h3>
                <input class="searchContainer" id="username" style="border:none; outline:none; background:transparent" disabled readonly></input> 
                <button id="changeUsername">CAMBIA USERNAME</button><br>
                <div style="display: inline-flex; margin-top: 10px;">
                    <button id="confirmUserChange" class="greenButton" style="display:none">CONFERMA</button>
                    <button id="cancelUserChange" class="redButton"style="display:none">ANNULLA</button>
                </div>
                <span class="changeError" id="errorText"></span>

            </div>
            <!-- Div con solo la data di nascita -->
            <div class="recipeCard profileCard">
                <h3>DATA DI NASCITA</h3>
                <input id="birthdate" type="date" style="border:none; outline:none; background:transparent" readonly></input>

            </div>

            <!-- Div con i tasti per cambiare la mail -->
            <div class="recipeCard profileCard">
                <h3>EMAIL</h3>
                <input class="searchContainer" id="email" style="border:none; outline:none; background:transparent" disabled readonly></input>
                <button id="changeMail">CAMBIA MAIL</button><br>
                <div style="display: inline-flex; margin-top: 10px;">
                    <button id="confirmEmailChange" class="greenButton" style="display:none">CONFERMA</button>
                    <button id="cancelEmailChange" class="redButton" style="display:none">ANNULLA</button>
                </div>
            </div>

            <!-- Div con i tasti per cambiare la password -->
            <div class="recipeCard profileCard">
                <h3>CAMBIA PASSWORD</h3>
                <button id="changePassword">CAMBIA PASSWORD</button>
                <input class="searchContainer" id="changePasswordInput" style="display:none"></input>
                <div style="display: inline-flex;">
                    <button id="confirmPasswordChange" class="greenButton" style="display:none">CONFERMA</button>
                    <button id="cancelPasswordChange" class="redButton" style="display:none">ANNULLA</button>
                </div>
            </div>

            <!-- Div con il tasto per cancellare l'account -->
            <div class="recipeCard profileCard">
                <h3>ACCOUNT</h3>
                <button class="redButton" id="deleteAccountButton">CANCELLA ACCOUNT</button>
            </div>
        </div>
    </div>

    <script src="page.js"></script>
    <script src="auth.js"></script>
    <script src="api.js"></script>

</body>
