<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontawesome/css/all.css">
    <title>theMealDB Project: Registrazione</title>


</head>
<body class="auth-page">    <!-- Classe del body definita perché ha una grafica personalizzata -->
    
    <!-- Il rettangolo centrale della sezione di registrazione -->
    <div class="loginSquare">
        <h1>theMealDB Project</h1>
        <h1>Registrazione</h1>
        <div id="registerForm">
            <input class="searchContainer" type="text" id="email" placeholder="Email">
            <input class="searchContainer" type="password" id="password" placeholder="Password">
            <input class="searchContainer" type="text" id="username" maxlength="20" placeholder="User Name">
            <span style="font-size: 10px;">Data di nascita:</span>
            <input class="searchContainer" type="date" id="birthdate" placeholder="Birth Date"><br>

            <button id="registerButton">REGISTRATI </button>
            <span id="emailError"></span>

        </div><br>
        <span>Già iscritto? </span> <button onclick='window.location.replace("index.html")'>ACCEDI</button>
    </div>
        <script src="auth.js"></script>
</body>
