<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontawesome/css/all.css">
    <title>theMealDB Project: Registrazione</title>


</head>
<body class="auth-page">
    <div class="loginSquare">
        <h1>theMealDB Project</h1>
        <h1>Registrazione</h1>
        <div id="registerForm">
            <input class="searchContainer" type="text" id="email" placeholder="Email">
            <input class="searchContainer" type="password" id="password" placeholder="Password">
            <input class="searchContainer" type="text" id="username" placeholder="User Name">
            <input class="searchContainer" type="date" id="birthdate" placeholder="Birth Date"><br>

            <button id="registerButton">REGISTRATI</button>
        </div><br>
        <span>Già iscritto? </span> <button onclick='window.location.replace("index.html")'>ACCEDI</button>
        <br><br><span id="emailError"></span>
    </div>
        <script src="auth.js"></script>
</body>
