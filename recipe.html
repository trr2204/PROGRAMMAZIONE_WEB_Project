<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontawesome/css/all.css">
    <!-- Title impostata via JS-->
</head>
<body>
    
    <!-- Barra con i tasti per navigare -->
    <header class="profileBar">
        <span>theMealDB Project</span>
        <div class="menuUserCookbook">
            <button id="homeButton"><i class="fa-solid fa-home"></i><span> Torna in Home</span></button>
            <button id="cookbookButton"><i class="fa-solid fa-book"></i><span> Ricettario</span></button>
            <button id="profileButton"><i class="fa-solid fa-user"></i><span> Impostazioni Profilo</span></button>
            <button id="logoutButton"><i class="fa-solid fa-arrow-right-from-bracket"></i><span> Log Out</span></button>
        </div>
    </header>

    <!-- Sfondo grigio che contiene tutti i tasti -->
    <div class="cardBackground">
        <!-- Riga con titolo e foto -->
        <div class="firstRow">
            <div class="recipeCard title">
                <div class="infoColumn">
                    <h1 id="strMeal"></h1>
                </div>
                <div class="infoColumn2">
                    <h2 id="strCategory"></h2>
                    <button id="favoritesButton"><i class="fa-regular fa-heart"></i></button>
                    <h3 id="strArea"></h3>
                    <a id="strSource">Fonte</a>

                </div>
            </div>
            <div class="recipeCard imageColumn">
                    <img id="strMealThumb">
            </div>
        </div> 

        <!-- Riga con ingredienti e istruzioni -->
        <div class="middleRow">
            <div class="recipeCard ingredients">
                <h3>Ingredienti</h3>
                <table id="strIngredient">
                </table>
            </div>
            <div class="recipeCard instructions">
                <h3>Istruzioni</h3><br>
                <span id="strInstructions"></span><br>
            </div>
        </div>
        <!-- Riga con recensione e note -->
        <div class="lastRow">
            <div class="recipeCard review">
                <h3>Recensione</h3><br>
                <!-- Casella difficoltà, con slider e valore numerico dello slider -->
                <div class="infoCard difficultyBg">
                    <div class="iconBox difficulty"><i class="fa-solid fa-fire"></i></div>
                    <div class="infoText"><b>Difficoltà</b></div>
                    <input type="range" id="difficultySlider" step="0.1" min="0" max="5" value="3"></input>
                    <b class="vote" id="difficultyLabel"></b>
                </div>

                <!-- Casella gusto, con slider e valore numerico dello slider -->
                <div class="infoCard tasteBg">
                    <div class="iconBox taste"><i class="fa-solid fa-star"></i></div>
                    <div class="infoText"><b>Gusto</b></div>
                    <input type="range" id="tasteSlider" step="0.1" min="0" max="5" value="3"></input>
                    <b class="vote" id="tasteLabel"></b>
                </div>

                <!-- Casella data preparazione, con solo l'input con la data -->
                <div class="infoCard dateBg">
                    <div class="iconBox date"><i class="fa-solid fa-calendar"></i></div>
                    <div class="infoText"><b>Preparato il</b></div>
                    <input type="date" id="preparationDate"></input>
                </div>

                <!-- Casella voto, contiene anche i tasti per aggiungere, modificare o eliminare le recensioni -->
                <div class="infoCard voteCard">
                    <b>Voti: <span id="reviewCounter"></span></b><br>
                    <div>
                        <button class="greenButton" id="leaveReviewButton">Aggiungi una recensione</button><br>
                        <span id="reviewError" class="changeError"></span>
                    </div>
                </div>
            </div>

            <!-- Sezione che contiene le note visibili solo dall'utente -->
            <div class="recipeCard note">
                <h3>Aggiungi una nota (solo tu puoi vederle)</h3>
                <textarea id="privateNoteInput"></textarea>
                <button id="saveNoteButton">Salva nota</button>
            </div>
        </div>
    </div>


        
    <script src="page.js"></script>
    <script src="auth.js"></script>
    <script src="api.js"></script>
    <script src="cookbook.js"></script>


</body>
